# Respiration-SRNN config for HiPerGator  (created by Claude)
# Same as config_respiration.yaml but with HiPerGator data paths active.
# Use this on HPG:  --config respiration/config_respiration_hpg.yaml

paths:
  # data on HiPerGator. NOTE: respiration/valence/ only holds RI1_s1_1, RI1_s1_2,
  # RI2_s1_1, RI2_s1_2 -- it does NOT have the chosen RI2_s2_3 / RI2_s3_6. So point h5_dir
  # at the FULL h5 set (the Keypoint Resp_h5 folder). VERIFY this path exists on HPG;
  # if your full h5 set lives elsewhere, update h5_dir accordingly.
  h5_dir:  "/home/t.heeps/blue_npadillacoreano/npadillacoreano/share/respiration-project/Keypoint RI1+RI2/Resp_h5"
  csv_dir: "/home/t.heeps/blue_npadillacoreano/npadillacoreano/share/respiration-project/RI1-RI2-behavior"
  out_dir:  "./respiration/data_prepared"
  save_dir: "./respiration/result"
  plot_dir: "./respiration/plot"

# ALL recordings (7 positive RI1 + 8 negative RI2); 8 subjects -> n=8 for leave-one-subject-out.
recordings:
  - "RI1_s1_1"   # positive
  - "RI1_s1_2"
  - "RI1_s2_3"
  - "RI1_s2_4"
  - "RI1_s3_6"
  - "RI1_s4_7"
  - "RI1_s4_8"
  - "RI2_s1_1"   # negative
  - "RI2_s1_2"
  - "RI2_s2_3"
  - "RI2_s2_4"
  - "RI2_s3_5"
  - "RI2_s3_6"
  - "RI2_s4_7"
  - "RI2_s4_8"

valence_map:
  RI1: 1   # positive
  RI2: 0   # negative

preprocess:
  resp_key: "resp"
  orig_fs: 20000
  target_fs: 50
  lowpass_order: 4
  bandpass_low: 0.1
  bandpass_high: 20
  bandpass_order: 2
  zscore: true
  subject_only: true
  # --- dead-signal removal: drop flat/low-amplitude noisy stretches BEFORE windowing ---
  remove_dead_signal: true   # detect + exclude "dead" respiration (flat, mostly noise)
  dead_win_sec: 1.0          # rolling window (s) for local amplitude (std)
  dead_ref_pct: 75.0         # percentile of local std used as "typical active amplitude" (robust to dead-heavy recs)
  dead_rel_thresh: 0.25      # dead if local std < this fraction of that reference (data-tuned; see docs)
  dead_abs_thresh: 0.0       # also dead if local std < this absolute value (z-scored units; 0 = off)
  dead_min_sec: 2.0          # ignore dead runs shorter than this (s) (don't nick brief between-breath dips)
  max_window_dead_frac: 0.20 # never keep a window with more than this fraction of dead samples
  behavior_states:
    "body sniffing": 1
    "anogenital sniffing": 2
    "facial sniffing": 3

windowing:
  window_sec: 30.0           # T = 1500
  windows_per_recording: 10  # top-N sniffing-richest non-overlapping windows per recording
  rank_by_sniffing: true

system:
  device: "cuda"             # uses the GPU on HPG automatically
  dtype: "float32"
  seed: 131

model:
  num_tv: 4
  hidden_shape: 8
  bottleneck_shape: 16
  neural_private_shape: 8

train:
  split_mode: "subject"      # leave-one-SUBJECT-out (the only leakage-free split; LORO removed)
  fold: 0
  epochs: 2000
  lr: 0.001
  coef_cross: 0.0          # 0 = DISCOVERY (switches learned from respiration, not sniff labels).
                           # RI2 has ~0% sniffing, so supervised (0.5) would make valence
                           # separation label-driven. Run 0.5 separately if you want the
                           # behaviorally-supervised variant for comparison.
  batch_size: 256           # all train windows in ONE batch -> per-fold time ~flat as recordings grow
  eval_every: 25
