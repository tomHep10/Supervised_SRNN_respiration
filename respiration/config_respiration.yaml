# Respiration-SRNN config  (created by Claude)
# Drives prepare_respiration.py -> train_respiration.py -> plot_respiration.py

paths:
  # --- LOCAL (Windows) defaults, used for the smoke test on this machine ---
  h5_dir:  "C:/Users/thoma/Code/ResearchCode/KeypointMoSeqPadilla-CoreanoLab/Keypoint RI1+RI2/Resp_h5"
  csv_dir: "C:/Users/thoma/Code/ResearchCode/respiratory_pilot/Data/behavior_aim1"
  # --- HiPerGator equivalents (swap in when running there) ---
  # h5_dir:  "/home/t.heeps/blue_npadillacoreano/npadillacoreano/share/respiration-project/respiration/valence"
  # csv_dir: "/home/t.heeps/blue_npadillacoreano/npadillacoreano/share/respiration-project/RI1-RI2-behavior"
  out_dir: "./respiration/data_prepared"      # prepared .npy/.npz go here
  save_dir: "./respiration/result"            # model checkpoints
  plot_dir: "./respiration/plot"

# The 4 valence recordings (matched to h5 + csv by this 3-token prefix).
# ALL available recordings (7 positive RI1 + 8 negative RI2) — enough for a
# meaningful leave-one-recording-out decoder (n=15).
recordings:
  - "RI1_s1_1"   # positive
  - "RI1_s1_2"
  - "RI1_s2_3"
  - "RI1_s2_4"
  - "RI1_s3_6"
  - "RI1_s4_7"
  - "RI1_s4_8"
  - "RI2_s1_1"   # negative
  - "RI2_s1_2"
  - "RI2_s2_3"
  - "RI2_s2_4"
  - "RI2_s3_5"
  - "RI2_s3_6"
  - "RI2_s4_7"
  - "RI2_s4_8"

# Per-recording valence label (from h5 metadata 'trial_type'): RI1=positive, RI2=negative.
# Used ONLY for downstream analysis (PCA/decoding), NOT fed to the model.
valence_map:
  RI1: 1   # positive
  RI2: 0   # negative

preprocess:
  resp_key: "resp"            # dataset name inside the h5
  orig_fs: 20000              # Trodes sampling rate (also read from h5 metadata)
  target_fs: 50               # downsample target (Hz) == target_rate in your pipeline
  # --- your respiration cleaning pipeline (lowpass -> downsample -> bandpass) ---
  lowpass_order: 4            # anti-alias butterworth order; cutoff = target_fs/2
  bandpass_low: 0.1           # nk.signal_filter lowcut (Hz)
  bandpass_high: 20           # nk.signal_filter highcut (Hz)
  bandpass_order: 2           # nk.signal_filter butterworth order
  zscore: true               # z-score the cleaned respiration per recording (model conditioning)
  subject_only: true         # use only BORIS rows where Subject == 'subject'
  # Behavior -> discrete state id. 0 = nonsocial/other. ONLY the 3 sniff types are
  # modeled; posturing/chasing/fighting are disregarded (fall to 0).
  behavior_states:
    "body sniffing": 1
    "anogenital sniffing": 2
    "facial sniffing": 3

# Windowing: per recording, tile into non-overlapping contiguous 30 s windows and keep
# the N richest in SNIFFING (the 3 behaviors above). Each window stays a natural
# continuous segment of the original recording (no overlap, no stitching, no centering).
windowing:
  window_sec: 30.0           # T = 30 * 50 = 1500 timesteps
  windows_per_recording: 10  # keep the top-N sniffing-richest non-overlapping windows
  rank_by_sniffing: true     # rank windows by fraction of sniffing timepoints

system:
  device: "cuda"             # auto-falls back to CPU if no GPU
  dtype: "float32"
  seed: 131

model:
  num_tv: 4                  # discrete states: 0 nonsocial + 3 sniff types (matches behavior_states)
  hidden_shape: 8            # continuous latent dimension (where valence may live)
  bottleneck_shape: 16       # unused (kept for checkpoint compatibility)
  neural_private_shape: 8    # unused (kept for checkpoint compatibility)

train:
  split_mode: "recording"    # "recording" = leave-one-recording-out (no leakage); "window" = random KFold over windows
  fold: 0                    # which recording (or window-fold) is held out for test
  epochs: 2000
  lr: 0.001
  coef_cross: 0.0           # discovery (unsupervised switches)
  batch_size: 256           # fits all train windows in ONE batch -> per-fold time ~flat as recordings grow
  eval_every: 25             # run/print test eval every N epochs (keeps memory/IO sane on real data)
