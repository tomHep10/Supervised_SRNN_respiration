# Rank-SRNN config — COHORT: incl_s3_6  (created by Claude)
# Same as config_rank_hpg.yaml (the "base" cohort) EXCEPT it force-includes CM_s3_6 (cage 3's
# Dominant, which has no scored behavior) so every cage has both ranks -> 8 recordings, a
# cleaner 4-cage leave-one-cage-out test. Writes to its OWN output dirs (suffixed _incl_s3_6)
# so it never overwrites the base cohort's results.
# Run:  sbatch hipergator/prepare_rank.slurm   respiration/rank/config_rank_incl_s3_6.yaml
#       sbatch hipergator/rank_job_loco.slurm  respiration/rank/config_rank_incl_s3_6.yaml
#       sbatch hipergator/analyze_rank.slurm   respiration/rank/config_rank_incl_s3_6.yaml

cohort: "rank_incl_s3_6"

paths:
  h5_dir:  "/home/t.heeps/blue_npadillacoreano/npadillacoreano/share/respiration-project/respiration/cagemates_baseline"
  csv_dir: "/home/t.heeps/blue_npadillacoreano/npadillacoreano/share/respiration-project/cagemate_baseline_behavior"
  # COHORT-SPECIFIC outputs (suffixed) — keeps this cohort's results separate from base.
  out_dir:  "./respiration/data_prepared_rank_incl_s3_6"
  save_dir: "./respiration/result_rank_incl_s3_6"
  plot_dir: "./respiration/plot_rank_incl_s3_6"

rank_map:
  s1_1: 0
  s1_2: 1
  s2_3: 0
  s2_4: 1
  s3_5: 0
  s3_6: 1
  s4_7: 0
  s4_8: 1

discovery:
  glob: "*_merged.h5"
  skip_no_csv: true
  min_sniff_bouts: 5
  # THIS is the cohort difference: keep s3_6 even though it has 0 sniff bouts. Its windows are
  # picked chronologically (no behavior), giving cage 3 a Dominant so the LOCO test is balanced.
  force_include_subjects: ["s3_6"]
  exclude_cages: []

preprocess:
  resp_key: "resp"
  orig_fs: 20000
  target_fs: 50
  lowpass_order: 4
  bandpass_low: 0.1
  bandpass_high: 20
  bandpass_order: 2
  zscore: true
  subject_only: true
  max_bout_sec: 30.0
  remove_dead_signal: true
  dead_win_sec: 1.0
  dead_ref_pct: 75.0
  dead_rel_thresh: 0.25
  dead_abs_thresh: 0.0
  dead_min_sec: 2.0
  max_window_dead_frac: 0.20
  behavior_states:
    "body sniffing": 1
    "anogenital sniffing": 2
    "facial sniffing": 3

windowing:
  window_sec: 30.0
  windows_per_recording: 10
  rank_by_sniffing: true

system:
  device: "cuda"
  dtype: "float32"
  seed: 131

model:
  num_tv: 4
  hidden_shape: 8
  bottleneck_shape: 16
  neural_private_shape: 8

train:
  split_mode: "cage"
  fold: 0
  epochs: 2000
  lr: 0.001
  coef_cross: 0.0
  batch_size: 256
  eval_every: 25
